<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signing in... · What'sToday</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    window.__API_BASE__          = '%VITE_API_URL%';
    window.__SUPABASE_URL__      = '%VITE_SUPABASE_URL%';
    window.__SUPABASE_ANON_KEY__ = '%VITE_SUPABASE_ANON_KEY%';
  </script>
</head>
<body>
  <div id="navContainer"></div>

  <main class="site">
    <div class="container">
      <div class="authGrid">
        <!-- 처리 중 표시 -->
        <div id="statusBox">
          <h1>Signing you in...</h1>
          <p style="color:var(--text-light)">Please wait a moment.</p>
        </div>

        <!-- 에러 표시 -->
        <div class="errorMsg" id="errorMsg" style="display:none;"></div>

        <!-- username 입력 모달 (신규 유저일 때만 보임) -->
        <div id="usernameModal" style="display:none;">
          <h1>Choose a username</h1>
          <p style="color:var(--text-light);font-size:14px">
            This will be your public name. 3-20 characters, letters/numbers/underscore.
          </p>
          <div class="fieldGroup">
            <label for="username">Username</label>
            <input type="text" id="username" autocomplete="username" />
          </div>
          <div class="formActions">
            <button class="accentBtn" id="usernameBtn">Create Account</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="footerContainer"></div>

  <script src="js/api.js"></script>
  <script src="js/shared.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/callback.js"></script>
</body>
</html>
