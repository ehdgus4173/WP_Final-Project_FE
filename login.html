<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In · What'sToday</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@500&display=swap" rel="stylesheet" />
  <script>
    window.__API_BASE__ = '%VITE_API_URL%';
    window.__SUPABASE_URL__ = '%VITE_SUPABASE_URL%';
    window.__SUPABASE_ANON_KEY__ = '%VITE_SUPABASE_ANON_KEY%';
  </script>
  <script>window.__API_BASE__ = '%VITE_API_URL%';</script>
</head>

<body>
  <div id="navContainer"></div>

  <main class="site">
    <div class="container">
      <div class="authGrid">
        <h1>Log In</h1>

        <div class="errorMsg" id="errorMsg" style="display: none;"></div>

        <div class="fieldGroup">
          <label for="email">Email</label>
          <input type="email" id="email" autocomplete="email" />
        </div>

        <div class="fieldGroup">
          <label for="password">Password</label>
          <input type="password" id="password" autocomplete="current-password" />
        </div>

        <div class="formActions">
          <button class="accentBtn" id="loginBtn">Log In</button>
        </div>

        <div class="oauthDivider">or</div>
        <div class="oauthButtons">
          <button class="gsi-material-button" id="googleBtn">
            <div class="gsi-material-button-state"></div>
            <div class="gsi-material-button-content-wrapper">
              <div class="gsi-material-button-icon">
                <svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"
                  xmlns:xlink="http://www.w3.org/1999/xlink" style="display: block;">
                  <path fill="#EA4335"
                    d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z">
                  </path>
                  <path fill="#4285F4"
                    d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z">
                  </path>
                  <path fill="#FBBC05"
                    d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z">
                  </path>
                  <path fill="#34A853"
                    d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z">
                  </path>
                  <path fill="none" d="M0 0h48v48H0z"></path>
                </svg>
              </div>
              <span class="gsi-material-button-contents">Sign in with Google</span>
              <span style="display: none;">Sign in with Google</span>
            </div>
          </button>
          <button class="gsi-material-button github-button" id="githubBtn">
  <div class="gsi-material-button-state"></div>
  <div class="gsi-material-button-content-wrapper">
    <div class="gsi-material-button-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:block;" fill="#ffffff">
        <path d="M12 .5C5.37.5 0 5.78 0 12.29c0 5.21 3.44 9.63 8.21 11.19.6.11.82-.25.82-.56 0-.28-.01-1.02-.02-2-3.34.71-4.04-1.58-4.04-1.58-.55-1.36-1.34-1.72-1.34-1.72-1.09-.73.08-.72.08-.72 1.21.08 1.84 1.22 1.84 1.22 1.07 1.8 2.81 1.28 3.5.98.11-.76.42-1.28.76-1.57-2.67-.3-5.47-1.31-5.47-5.83 0-1.29.47-2.34 1.24-3.17-.12-.3-.54-1.52.12-3.16 0 0 1.01-.32 3.3 1.21a11.5 11.5 0 0 1 3-.4c1.02 0 2.05.13 3 .4 2.28-1.53 3.29-1.21 3.29-1.21.66 1.64.24 2.86.12 3.16.77.83 1.24 1.88 1.24 3.17 0 4.53-2.81 5.53-5.49 5.82.43.37.81 1.1.81 2.22 0 1.6-.01 2.89-.01 3.29 0 .31.21.68.83.56C20.56 21.91 24 17.5 24 12.29 24 5.78 18.63.5 12 .5z"/>
      </svg>
    </div>
    <span class="gsi-material-button-contents">Sign in with GitHub</span>
  </div>
</button>
        </div>

        <p style="margin-top:16px;font-size:14px;color:var(--text-light)">
          Don't have an account? <a href="register.html" style="color:var(--accent)">Sign up</a>
        </p>
      </div>
    </div>
  </main>

  <div id="footerContainer"></div>

  <!-- 로드 순서 중요: api.js → shared.js → 페이지 JS -->
  <script src="js/api.js"></script>
  <script src="js/shared.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/login.js"></script>
</body>

</html>
